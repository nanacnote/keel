name: Publish

# Triggered when a GitHub release is published. Create a release from a
# version tag (e.g. v0.2.0) to kick off the build and attach the wheel and
# sdist as downloadable assets on the release page.
on:
  release:
    types: [published]

jobs:
  build-and-upload:
    name: Build and attach to release
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to upload assets to the release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so hatch-vcs can read tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Attach dist assets to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

